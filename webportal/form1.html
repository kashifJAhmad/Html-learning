<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header class="bg-primary text-white text-center py-4">
        <h1>Student Registration</h1>
        <p>Please fill in your details to register.</p>
    </header>
    <main class="container my-5">
        <form class="row g-3 registration-form">
            <div class="col-md-6">
                <label for="name" class="form-label">Full Name:</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Enter your full name" required>
            </div>
            <div class="col-md-6">
                <label for="dob" class="form-label">Date of Birth:</label>
                <input type="date" class="form-control" id="dob" name="dob" required>
            </div>
            <div class="col-md-6">
                <label for="prn" class="form-label">PRN (Permanent Registration Number):</label>
                <input type="text" class="form-control" id="prn" name="prn" placeholder="Enter your PRN" required>
            </div>
            <div class="col-md-6">
                <label for="email" class="form-label">Email Address:</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="col-md-6">
                <label for="phone" class="form-label">Phone Number:</label>
                <input type="tel" class="form-control" id="phone" name="phone" placeholder="Enter your phone number" required>
            </div>
            <div class="col-md-6">
                <label for="password" class="form-label">Password:</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Gender:</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" id="male" name="gender" value="Male" required>
                    <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" id="female" name="gender" value="Female">
                    <label class="form-check-label" for="female">Female</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" id="other" name="gender" value="Other">
                    <label class="form-check-label" for="other">Other</label>
                </div>
            </div>
            <div class="col-md-6">
                <label for="year" class="form-label">Year:</label>
                <select class="form-select" id="year" name="year" required>
                    <option value="">Select Year</option>
                    <option value="FE">First Year (FE)</option>
                    <option value="SE">Second Year (SE)</option>
                    <option value="TE">Third Year (TE)</option>
                    <option value="BE">Fourth Year (BE)</option>
                </select>
            </div>
            <div class="col-md-6">
                <label for="division" class="form-label">Division:</label>
                <select class="form-select" id="division" name="division" required>
                    <option value="">Select Division</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                </select>
            </div>
            <div class="col-12 text-center">
                <button type="submit" class="btn btn-primary">Register</button>
            </div>
        </form>
    </main>
    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2026 Student Tracker. All rights reserved.</p>
    </footer>
    <script>
        document.querySelector('.registration-form').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            // Get form data
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData);
            
            // Basic validation
            let isValid = true;
            let errors = [];
            
            if (!data.name.trim()) {
                errors.push('Full Name is required');
                isValid = false;
            }
            if (!data.dob) {
                errors.push('Date of Birth is required');
                isValid = false;
            }
            if (!data.prn.trim()) {
                errors.push('PRN is required');
                isValid = false;
            }
            if (!data.email.trim() || !/\S+@\S+\.\S+/.test(data.email)) {
                errors.push('Valid Email is required');
                isValid = false;
            }
            if (!data.phone.trim() || !/^\d{10}$/.test(data.phone)) {
                errors.push('Valid 10-digit Phone Number is required');
                isValid = false;
            }
            if (!data.password.trim()) {
                errors.push('Password is required');
                isValid = false;
            }
            if (!data.gender) {
                errors.push('Gender is required');
                isValid = false;
            }
            if (!data.year) {
                errors.push('Year is required');
                isValid = false;
            }
            
            if (!isValid) {
                alert('Please fix the following errors:\n' + errors.join('\n'));
                return;
            }
            
            // Prepare data for API
            const apiData = {
                name: data.name,
                email: data.email,
                phone: data.phone,
                password: data.password,
                role: 'student',
                course: data.course,
                year: data.year,
                division: data.division,
                employee_id: data.prn
            };
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(apiData)
                });
                const result = await response.json();
                if (response.ok) {
                    localStorage.setItem('currentUserId', result.id);
                    localStorage.setItem('currentUserRole', 'student');
                    window.location.href = 'student-profile.html';
                } else {
                    alert('Registration failed: ' + result.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
